<!doctype html>
<html lang="es-CL">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Portal del alumno | MODU</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="section">
      <div class="container legal-page">
        <h1>Portal del alumno</h1>
        <p>Ingresa tu correo de inscripcion para abrir el portal del cliente.</p>
        <form id="portal-form" class="portal-form">
          <label for="portal-email">Correo electronico</label>
          <input id="portal-email" type="email" required placeholder="tuemail@dominio.com" />
          <button type="submit" class="btn btn-accent">Abrir portal</button>
        </form>
        <p id="portal-error" class="portal-error" hidden></p>
        <a class="btn btn-ghost" href="index.html#planes">Volver a planes</a>
      </div>
    </main>

    <script src="portal-page.js" defer></script>
  </body>
</html>
