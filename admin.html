<!doctype html>
<html lang="es-CL">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel Admin | MODU</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
      .admin-table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
      .admin-table th, .admin-table td { padding: 0.75rem 1rem; text-align: left; border-bottom: 1px solid #e5e7eb; }
      .admin-table th { font-weight: 600; background: #f9fafb; }
      .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 999px; font-size: 0.75rem; font-weight: 600; }
      .badge-active { background: #dcfce7; color: #166534; }
      .badge-pending { background: #fef9c3; color: #854d0e; }
      .badge-inactive, .badge-cancelled { background: #fee2e2; color: #991b1b; }
      .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
      .modal-overlay.open { display: flex; }
      .modal { background: white; border-radius: 0.75rem; padding: 2rem; width: 100%; max-width: 420px; }
      .modal h2 { margin-bottom: 1.5rem; }
      .form-group { margin-bottom: 1rem; }
      .form-group label { display: block; font-weight: 500; margin-bottom: 0.25rem; }
      .form-group input, .form-group select { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid #d1d5db; border-radius: 0.5rem; font-size: 1rem; }
      .form-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
      .error-msg { color: #dc2626; margin-top: 0.5rem; font-size: 0.875rem; }
    </style>
  </head>
  <body>
    <main class="section">
      <div class="container">
        <div class="admin-header">
          <h1>Panel Admin</h1>
          <div style="display:flex;gap:1rem;align-items:center;">
            <span id="session-info" style="font-size:0.875rem;color:#6b7280;"></span>
            <button id="logout-btn" type="button" class="btn btn-ghost">Cerrar sesión</button>
          </div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
          <h2 style="margin:0;">Alumnos</h2>
          <button id="add-btn" type="button" class="btn btn-accent">+ Agregar alumno</button>
        </div>

        <div id="loading" style="color:#6b7280;">Cargando...</div>
        <div id="error-msg" class="error-msg" hidden></div>

        <table class="admin-table" id="alumnos-table" hidden>
          <thead>
            <tr>
              <th>Email</th>
              <th>Plan</th>
              <th>Estado</th>
              <th>Desde</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="alumnos-body"></tbody>
        </table>

        <p id="empty-msg" hidden style="color:#6b7280;">No hay alumnos todavía.</p>
      </div>
    </main>

    <!-- Modal agregar/editar -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <h2 id="modal-title">Agregar alumno</h2>
        <div class="form-group">
          <label for="input-email">Email</label>
          <input id="input-email" type="email" placeholder="alumno@email.com" />
        </div>
        <div class="form-group">
          <label for="input-plan">Plan</label>
          <select id="input-plan">
            <option value="">Sin plan</option>
            <option value="starter">Starter</option>
            <option value="pro">Pro</option>
            <option value="elite">Elite</option>
          </select>
        </div>
        <div class="form-group">
          <label for="input-status">Estado</label>
          <select id="input-status">
            <option value="active">Activo</option>
            <option value="pending">Pendiente</option>
            <option value="inactive">Inactivo</option>
            <option value="cancelled">Cancelado</option>
          </select>
        </div>
        <div id="modal-error" class="error-msg" hidden></div>
        <div class="form-actions">
          <button id="modal-save" type="button" class="btn btn-accent">Guardar</button>
          <button id="modal-cancel" type="button" class="btn btn-ghost">Cancelar</button>
        </div>
      </div>
    </div>

    <script src="admin-page.js" defer></script>
  </body>
</html>
