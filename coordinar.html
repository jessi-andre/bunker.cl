<!doctype html>
<html lang="es-CL">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coordinar evaluacion | MODU</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #f3f5f4;
        --surface: #ffffff;
        --surface-2: #ecefef;
        --text: #1b2127;
        --muted: #59636e;
        --border: #cfd6dc;
        --accent: #9ac756;
        --accent-strong: #86b043;
        --bg-glow: #eaeeee;
        --shadow: 0 10px 24px rgba(22, 30, 36, 0.12);
        --radius-lg: 1.4rem;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        background: radial-gradient(circle at 20% -10%, var(--bg-glow) 0%, var(--bg) 55%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .card {
        width: min(680px, 100%);
        background: linear-gradient(135deg, rgba(154, 199, 86, 0.12), rgba(255, 255, 255, 0.96));
        border: 1px solid rgba(154, 199, 86, 0.2);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 2rem;
        text-align: center;
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 0.75rem;
        color: var(--accent-strong);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 0.78rem;
        font-weight: 700;
      }

      h1 {
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
        letter-spacing: -0.03em;
        margin-bottom: 0.9rem;
      }

      p {
        color: var(--muted);
        font-size: 1.05rem;
        line-height: 1.6;
        max-width: 44ch;
        margin: 0 auto;
      }

      .actions {
        margin-top: 2rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        border-radius: 999px;
        padding: 0.95rem 1.2rem;
        font-size: 0.97rem;
        font-weight: 700;
        border: 1px solid transparent;
        transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
      }

      .btn:hover,
      .btn:focus-visible {
        transform: translateY(-1px);
      }

      .btn-primary {
        background: var(--accent);
        color: #172111;
        border-color: var(--accent);
      }

      .btn-primary:hover,
      .btn-primary:focus-visible {
        background: var(--accent-strong);
        border-color: var(--accent-strong);
        color: #0f140f;
      }

      .btn-ghost {
        background: transparent;
        border-color: #3a4652;
        color: var(--text);
      }

      .btn-ghost:hover,
      .btn-ghost:focus-visible {
        background: rgba(27, 33, 39, 0.06);
        border-color: #2f3a45;
      }

      @media (min-width: 640px) {
        .card {
          padding: 2.5rem;
        }

        .actions {
          flex-direction: row;
          justify-content: center;
        }

        .actions .btn {
          min-width: 220px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="eyebrow">Siguiente paso</span>
      <h1>Perfecto, ya tenemos tus datos</h1>
      <p>Ahora coordinemos tu evaluacion inicial y tu primer entrenamiento.</p>
      <div class="actions">
        <a
          href="https://wa.me/56912345678"
          id="whatsapp-link"
          class="btn btn-primary"
          target="_blank"
          rel="noopener noreferrer"
        >
          Coordinar por WhatsApp
        </a>
        <a href="/" class="btn btn-ghost">Volver al inicio</a>
      </div>
    </main>
    <script>
      (function () {
        const whatsappLink = document.getElementById("whatsapp-link");
        if (!whatsappLink) return;

        const params = new URLSearchParams(window.location.search);
        const email = String(params.get("email") || "").trim().toLowerCase();
        const whatsappNumber = "56912345678";
        const message = [
          "Hola! Me acabo de inscribir en MODU.",
          `Mi email es: ${email || "[EMAIL]"}`,
          "Ya complete mis datos iniciales y quiero coordinar mi evaluacion inicial.",
        ].join("\n");
        const whatsappUrl = `https://wa.me/${whatsappNumber}?text=${encodeURIComponent(message)}`;

        whatsappLink.href = whatsappUrl;

        whatsappLink.addEventListener("click", async function (event) {
          event.preventDefault();

          try {
            if (email) {
              await fetch("/api/track-whatsapp", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({ email }),
                keepalive: true,
              });
            }
          } catch (_) {}

          window.open(whatsappUrl, "_blank", "noopener,noreferrer");
        });
      })();
    </script>
  </body>
</html>
