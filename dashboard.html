<!doctype html>
<html lang="es-CL">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Panel MODU</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      :root {
        --dashboard-bg: #0a0a0a;
        --dashboard-surface: #111111;
        --dashboard-surface-2: #171717;
        --dashboard-border: rgba(255, 255, 255, 0.1);
        --dashboard-text: #ffffff;
        --dashboard-muted: rgba(255, 255, 255, 0.62);
        --dashboard-accent: #a8ff3e;
        --dashboard-accent-soft: rgba(168, 255, 62, 0.12);
        --dashboard-shadow: 0 20px 60px rgba(0, 0, 0, 0.38);
      }

      body {
        background:
          radial-gradient(circle at top left, rgba(168, 255, 62, 0.12), transparent 28%),
          linear-gradient(180deg, #050505 0%, #0a0a0a 100%);
        color: var(--dashboard-text);
      }

      .dashboard-shell {
        padding: calc(var(--space-6) + 0.5rem) 0 var(--space-6);
      }

      .dashboard-hero {
        display: grid;
        gap: var(--space-4);
        margin-bottom: var(--space-5);
        padding: var(--space-5);
        background:
          linear-gradient(135deg, rgba(168, 255, 62, 0.09), rgba(255, 255, 255, 0.02)),
          var(--dashboard-surface);
        border: 1px solid rgba(168, 255, 62, 0.12);
        border-radius: var(--radius-lg);
        box-shadow: var(--dashboard-shadow);
      }

      .dashboard-topline {
        display: flex;
        flex-direction: column;
        gap: var(--space-3);
      }

      .dashboard-intro h1 {
        margin-bottom: var(--space-2);
        color: var(--dashboard-text);
      }

      .dashboard-subtitle {
        max-width: 60ch;
        margin: 0;
        color: var(--dashboard-muted);
      }

      .dashboard-meta {
        font-size: 0.92rem;
        color: rgba(255, 255, 255, 0.48);
      }

      .dashboard-actions {
        display: flex;
        flex-direction: column;
        gap: var(--space-2);
        align-items: flex-start;
      }

      .summary-grid {
        display: grid;
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }

      .summary-card {
        background: var(--dashboard-surface);
        border: 1px solid var(--dashboard-border);
        border-radius: var(--radius-lg);
        padding: var(--space-4);
        box-shadow: var(--dashboard-shadow);
      }

      .summary-card span {
        display: block;
        color: var(--dashboard-muted);
        font-size: 0.9rem;
        margin-bottom: 0.45rem;
      }

      .summary-card strong {
        display: block;
        font-size: clamp(2rem, 4vw, 2.6rem);
        line-height: 1;
        letter-spacing: -0.04em;
        color: var(--dashboard-text);
      }

      .dashboard-panel {
        background: var(--dashboard-surface);
        border: 1px solid var(--dashboard-border);
        border-radius: var(--radius-lg);
        box-shadow: var(--dashboard-shadow);
        overflow: hidden;
      }

      .dashboard-panel-head {
        padding: var(--space-4);
        border-bottom: 1px solid var(--dashboard-border);
      }

      .dashboard-panel-head h2 {
        margin-bottom: 0.35rem;
        color: var(--dashboard-text);
      }

      .dashboard-panel-head p {
        margin: 0;
        color: var(--dashboard-muted);
      }

      .dashboard-table-wrap {
        overflow-x: auto;
      }

      .dashboard-table {
        width: 100%;
        border-collapse: collapse;
      }

      .dashboard-table th,
      .dashboard-table td {
        padding: 1rem;
        text-align: left;
        border-bottom: 1px solid var(--dashboard-border);
        font-size: 0.95rem;
        vertical-align: middle;
      }

      .dashboard-table th {
        color: rgba(255, 255, 255, 0.48);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        background: rgba(255, 255, 255, 0.02);
      }

      .dashboard-table tbody tr:hover {
        background: rgba(168, 255, 62, 0.05);
      }

      .dashboard-table tbody tr:last-child td {
        border-bottom: 0;
      }

      .dashboard-table td {
        color: var(--dashboard-text);
      }

      .name-cell strong {
        display: block;
        font-size: 0.98rem;
        color: var(--dashboard-text);
      }

      .name-cell span {
        display: block;
        margin-top: 0.2rem;
        font-size: 0.82rem;
        color: rgba(255, 255, 255, 0.46);
      }

      .status-pill,
      .onboarding-pill {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 0.2rem 0.7rem;
        border-radius: 999px;
        font-size: 0.8rem;
        font-weight: 700;
      }

      .status-pill.is-active,
      .onboarding-pill.is-done {
        background: rgba(168, 255, 62, 0.16);
        color: var(--dashboard-accent);
      }

      .status-pill.is-pending {
        background: rgba(255, 190, 11, 0.14);
        color: #ffd166;
      }

      .status-pill.is-muted,
      .onboarding-pill.is-waiting {
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.62);
      }

      .dashboard-empty,
      .dashboard-error,
      .dashboard-loading {
        padding: var(--space-4);
      }

      .dashboard-loading,
      .dashboard-empty {
        color: var(--dashboard-muted);
      }

      .dashboard-error {
        color: #ff8f8f;
      }

      .dashboard-link {
        color: var(--dashboard-accent);
      }

      .dashboard-actions .btn-ghost {
        border-color: rgba(255, 255, 255, 0.22);
        color: #ffffff;
        background: rgba(255, 255, 255, 0.04);
      }

      .dashboard-actions .btn-ghost:hover,
      .dashboard-actions .btn-ghost:focus-visible {
        border-color: rgba(255, 255, 255, 0.4);
        background: rgba(255, 255, 255, 0.1);
      }

      @media (min-width: 768px) {
        .dashboard-topline {
          flex-direction: row;
          align-items: flex-start;
          justify-content: space-between;
        }

        .dashboard-actions {
          align-items: flex-end;
        }

        .summary-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="section dashboard-shell">
      <div class="container">
        <section class="dashboard-hero">
          <div class="dashboard-topline">
            <div class="dashboard-intro">
              <p class="eyebrow">Admin</p>
              <h1>Panel MODU</h1>
              <p class="dashboard-subtitle">
                Base de datos de alumnos de tu gimnasio.
              </p>
              <p class="dashboard-meta" id="session-info">Cargando panel...</p>
            </div>
            <div class="dashboard-actions">
              <button id="logout-btn" type="button" class="btn btn-ghost">Cerrar sesi&oacute;n</button>
            </div>
          </div>
        </section>

        <section class="summary-grid" aria-label="Resumen">
          <article class="summary-card">
            <span>Alumnos totales</span>
            <strong id="count-total">-</strong>
          </article>
          <article class="summary-card">
            <span>Onboarding completado</span>
            <strong id="count-completed">-</strong>
          </article>
          <article class="summary-card">
            <span>Pendientes</span>
            <strong id="count-pending">-</strong>
          </article>
        </section>

        <section class="dashboard-panel" aria-label="Lista de alumnos">
          <div class="dashboard-panel-head">
            <h2>Alumnos</h2>
            <p>Estado actual y avance de datos iniciales de tus alumnos.</p>
          </div>

          <p id="dashboard-loading" class="dashboard-loading">Cargando alumnos...</p>
          <p id="dashboard-error" class="dashboard-error" hidden></p>
          <p id="dashboard-empty" class="dashboard-empty" hidden>Aun no hay alumnos cargados.</p>

          <div class="dashboard-table-wrap" id="dashboard-table-wrap" hidden>
            <table class="dashboard-table">
              <thead>
                <tr>
                  <th>Nombre</th>
                  <th>Email</th>
                  <th>Estado</th>
                  <th>Onboarding</th>
                  <th>Creado</th>
                </tr>
              </thead>
              <tbody id="dashboard-rows"></tbody>
            </table>
          </div>
        </section>
      </div>
    </main>

    <script src="dashboard-page.js" defer></script>
  </body>
</html>
