<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Admin | Modu</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="login-body">
    <main class="login-card">
      <p class="login-eyebrow">MODU</p>
      <h1>Ingreso Admin</h1>
      <p class="login-subtitle">Acceso privado para gestionar alumnos y onboarding.</p>
      <form id="loginForm">
        <input id="email" name="email" type="email" placeholder="Email" required />
        <div class="password-field">
          <input
            id="password"
            name="password"
            type="password"
            placeholder="Contrase&ntilde;a"
            required
          />
          <button
            id="togglePasswordBtn"
            class="password-toggle"
            type="button"
            aria-label="Mostrar contrase&ntilde;a"
            aria-pressed="false"
          >
            &#128065;
          </button>
        </div>
        <button id="submitBtn" type="submit">Ingresar</button>
      </form>
      <div id="error" class="login-error" aria-live="polite"></div>
    </main>

    <script src="login-page.js" defer></script>
  </body>
</html>
